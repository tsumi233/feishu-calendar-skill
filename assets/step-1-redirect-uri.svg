<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" fill="#F6F8FC"/>
  <rect x="40" y="40" width="1120" height="680" rx="24" fill="#FFFFFF" stroke="#D8E0EE"/>
  <rect x="40" y="40" width="1120" height="64" rx="24" fill="#EAF0FF"/>
  <circle cx="84" cy="72" r="10" fill="#FF6B6B"/>
  <circle cx="114" cy="72" r="10" fill="#FFD166"/>
  <circle cx="144" cy="72" r="10" fill="#4DCCBD"/>
  <text x="180" y="80" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#1F2937">飞书开放平台 / 安全设置 / 重定向 URL</text>

  <text x="92" y="156" font-size="34" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-weight="700" fill="#111827">步骤 1：添加本机回调地址</text>
  <text x="92" y="202" font-size="22" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#4B5563">把下面这条地址精确加入应用的 Redirect URI / 重定向 URL 白名单。</text>

  <rect x="88" y="248" width="1024" height="92" rx="18" fill="#FFF9E8" stroke="#F59E0B" stroke-width="4"/>
  <text x="120" y="305" font-size="28" font-family="Menlo, Monaco, monospace" fill="#92400E">http://127.0.0.1:18790/feishu-calendar/callback</text>

  <rect x="88" y="388" width="1024" height="210" rx="18" fill="#F8FAFF" stroke="#D8E0EE"/>
  <text x="120" y="444" font-size="26" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-weight="700" fill="#111827">检查要点</text>
  <text x="120" y="490" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#374151">1. 协议必须是 http</text>
  <text x="120" y="530" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#374151">2. 主机必须是 127.0.0.1，不要写成 localhost</text>
  <text x="120" y="570" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#374151">3. 端口固定为 18790</text>
  <text x="120" y="610" font-size="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#374151">4. 路径固定为 /feishu-calendar/callback，不能多也不能少</text>

  <rect x="792" y="412" width="284" height="78" rx="16" fill="#2563EB"/>
  <text x="860" y="460" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-weight="700" fill="#FFFFFF">保存配置</text>

  <text x="92" y="666" font-size="20" font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#6B7280">示意图：不同版本飞书开放平台 UI 文案可能略有差异，但本质是同一项配置。</text>
</svg>
